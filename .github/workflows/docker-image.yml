name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  id-token: write
jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
  #  - name: Build the Docker image
  #    run: docker build . --file Dockerfile --tag my-image-name:latest

      
    - name: Set up JFrog CLI
      uses: jfrog/setup-jfrog-cli@v4   # This must be indented correctly under the step
      env:
        JF_URL: https://${{ vars.JF_URL }}/
      with:
        oidc-provider-name: hs-dynamic
        
      
    - name: Run JFrog CLI
      run: |
          # Ping the server
          jf rt ping
          jf docker pull hts2-hs-dock-demo-docker-local.jfrog.io/memcached:bookworm
          jf docker scan hts2-hs-dock-demo-docker-local.jfrog.io/memcached:bookworm
